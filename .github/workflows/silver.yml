name: Update Silver Price

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch silver price
        env:
          API_KEY: ${{ secrets.GOLDAPIKEY }}
        run: |
          echo "Fetching silver price..."

          response=$(curl -s -w "HTTPSTATUS:%{http_code}" \
          -H "x-access-token: $API_KEY" \
          https://api.gold-api.com/price/XAG)

          body=$(echo "$response" | sed -e 's/HTTPSTATUS\:.*//g')
          status_code=$(echo "$response" | sed -e 's/.*HTTPSTATUS://')

          echo "Status: $status_code"
          echo "$body" > silver.json

          cat silver.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add silver.json

          git commit -m "update silver price $(date)" || echo "no changes"

          git pull --rebase origin main

          git push origin main
