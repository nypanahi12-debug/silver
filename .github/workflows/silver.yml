name: Update Silver Price Secure

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      WORDPRESS_URL: "https://wikinoghreh.com/wp-json/silver/v1/update"
      API_KEY: "github-silver-api"
      SECRET_TOKEN: "aC93dpqMcNFlG7ypJHBuP3wK" # ← دقیقاً مثل وردپرس

    steps:
      - name: Fetch silver price
        run: |
          response=$(curl -s "https://api.gold-api.com/price/XAG?apikey=$API_KEY")

          echo "API Response: $response"

          price=$(echo $response | jq -r '.price')

          if [ "$price" = "null" ] || [ -z "$price" ]; then
            echo "❌ Failed to fetch price"
            exit 1
          fi

          echo "price=$price" >> $GITHUB_ENV

      - name: Send to WordPress
        run: |
          echo "🚀 Sending price ${{ env.price }}"

          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$WORDPRESS_URL" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $SECRET_TOKEN" \
            -d "{\"price\": ${{ env.price }}}")

          echo "$response"
