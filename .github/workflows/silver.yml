name: Update Silver Price Direct to WordPress

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch silver price
        id: fetch
        run: |
          response=$(curl -s https://api.gold-api.com/price/XAG)

          price=$(echo $response | jq '.price')

          echo "price=$price" >> $GITHUB_OUTPUT

      - name: Send to WordPress
        run: |
          curl -X POST "https://wikinoghreh.com/wp-json/silver/v1/update" \
          -u "github-silver-api:aC93 dpqM cNFl G7yp JHBu P3wK" \
          -H "Content-Type: application/json" \
          -d "{\"price\": ${{ steps.fetch.outputs.price }}}"
