name: Update Silver Price

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch silver price and update archive
        shell: bash
        run: |
          set -e

          echo "Fetching silver price..."

          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GOLD_API_KEY }}" "https://api.gold-api.com/price/XAG")

          echo "API Response:"
          echo "$RESPONSE"

          PRICE=$(echo "$RESPONSE" | jq -r '.price')

          echo "Extracted price: $PRICE"

          # ---------------------------
          # VALIDATION
          # ---------------------------
          if [ -z "$PRICE" ] || [ "$PRICE" = "null" ]; then
            echo "❌ Invalid price (null/empty). Skipping."
            exit 0
          fi

          if ! [[ "$PRICE" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "❌ Invalid price format. Skipping."
            exit 0
          fi

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # ---------------------------
          # SAFE INIT JSON FILE
          # ---------------------------
          if [ ! -f silver_price.json ] || ! jq empty silver_price.json 2>/dev/null; then
            echo "[]" > silver_price.json
          fi

          echo "Appending new record..."

          # ---------------------------
          # UPDATE ARCHIVE SAFELY
          # ---------------------------
          UPDATED=$(jq --arg price "$PRICE" --arg time "$NOW" '
            (if type == "array" then . else [] end)
            + [{"price": ($price | tonumber), "time": $time}]
            | if length > 500 then .[-500:] else . end
          ' silver_price.json)

          echo "$UPDATED" > silver_price.json

          echo "Updated JSON:"
          cat silver_price.json

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add silver_price.json

          git diff --cached --quiet && echo "No changes" || git commit -m "update silver price"

          git push
