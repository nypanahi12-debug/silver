name: Update Silver Price

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install jq -y

      - name: Fetch silver price and update archive
        run: |
          echo "Fetching silver price..."

          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GOLD_API_KEY }}" "https://api.gold-api.com/price/XAG")

          echo "API Response:"
          echo $RESPONSE

          PRICE=$(echo $RESPONSE | jq -r '.price')

          echo "Extracted price: $PRICE"

          # اعتبارسنجی
          if [ "$PRICE" = "null" ] || [ -z "$PRICE" ]; then
            echo "Error: price is null or empty. Skipping update."
            exit 0
          fi

          if ! [[ "$PRICE" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Error: price is not valid. Skipping update."
            exit 0
          fi

          # timestamp
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # اگر فایل وجود نداشت، بساز
          if [ ! -f silver_price.json ]; then
            echo "[]" > silver_price.json
          fi

          echo "Appending new record..."

          # اضافه کردن رکورد جدید + محدود کردن به 500 تا
          UPDATED=$(jq --arg price "$PRICE" --arg time "$NOW" '
            . += [{"price": ($price | tonumber), "time": $time}]
            | if length > 500 then .[-500:] else . end
          ' silver_price.json)

          echo "$UPDATED" > silver_price.json

          echo "Updated JSON:"
          cat silver_price.json

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add silver_price.json

          git commit -m "update silver price" || echo "Nothing to commit"

          git push
