name: Update Silver Price

on:
  schedule:
    - cron: "*/15 * * * *"   # هر 15 دقیقه
  workflow_dispatch:         # برای اجرای دستی هم (اختیاری ولی مفید)

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install jq -y

      - name: Fetch silver price (Fail-Safe)
        run: |
          echo "Fetching silver price..."

          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GOLD_API_KEY }}" "https://api.gold-api.com/price/XAG")

          echo "API Response:"
          echo $RESPONSE

          # استخراج price
          PRICE=$(echo $RESPONSE | jq -r '.price')

          echo "Extracted price: $PRICE"

          # ❌ اگر null یا خالی بود → آپدیت نکن
          if [ "$PRICE" = "null" ] || [ -z "$PRICE" ]; then
            echo "❌ Error: price is null or empty. Skipping update."
            exit 0
          fi

          # ❌ اگر عدد نبود → آپدیت نکن
          if ! [[ "$PRICE" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "❌ Error: price is not a valid number. Skipping update."
            exit 0
          fi

          # ✅ ذخیره امن
          echo "{\"silver_price\": $PRICE}" > silver_price.json

          echo "✅ Saved JSON:"
          cat silver_price.json

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add silver_price.json

          # فقط اگر تغییر داشت commit کن
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit"
          else
            git commit -m "update silver price"
            git push
          fi
